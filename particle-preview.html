<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo 粒子动效预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 0, 0, 0.3);
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="particleCanvas"></canvas>
  </div>
  <div class="info">鼠标移动有交互效果 | 刷新页面重新生成</div>

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height, centerX, centerY, radius;
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };
    let animationId;
    
    const colors = {
      body: '#1a1a2e',
      crater: '#ffffff',
      trail: '#1a1a2e',
    };

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
      radius = Math.min(width, height) * 0.22;
      initParticles();
    }
    
    class Particle {
      constructor(x, y, size, color, extra = {}) {
        this.originX = x;
        this.originY = y;
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
        this.floatSpeed = 0.0005 + Math.random() * 0.002;
        this.floatOffset = Math.random() * Math.PI * 2;
        this.floatRange = extra.floatRange || 0.8;
      }
      
      update(time) {
        const fx = Math.sin(time * this.floatSpeed + this.floatOffset) * this.floatRange;
        const fy = Math.cos(time * this.floatSpeed * 0.7 + this.floatOffset) * this.floatRange;
        this.x = this.originX + fx;
        this.y = this.originY + fy;
        
        if (mouse.active) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 120;
          if (dist < maxDist && dist > 0) {
            const force = (1 - dist / maxDist) * 20;
            this.x += (dx / dist) * force;
            this.y += (dy / dist) * force;
          }
        }
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }
    
    // 用网格方式密集填充圆形
    function fillCircle(cx, cy, r, spacing, excludeCircles = []) {
      const particles = [];
      const steps = Math.ceil(r * 2 / spacing);
      
      for (let i = -steps; i <= steps; i++) {
        for (let j = -steps; j <= steps; j++) {
          const px = cx + i * spacing;
          const py = cy + j * spacing;
          const dist = Math.hypot(px - cx, py - cy);
          
          if (dist > r) continue;
          
          // 检查是否在排除区域内
          let excluded = false;
          for (const ec of excludeCircles) {
            if (Math.hypot(px - ec.cx, py - ec.cy) < ec.r) {
              excluded = true;
              break;
            }
          }
          if (excluded) continue;
          
          // 添加随机偏移让分布更自然
          const offsetX = (Math.random() - 0.5) * spacing * 0.6;
          const offsetY = (Math.random() - 0.5) * spacing * 0.6;
          const size = spacing * 0.35 + Math.random() * spacing * 0.15;
          
          particles.push(new Particle(px + offsetX, py + offsetY, size, colors.body, { floatRange: 0.5 }));
        }
      }
      return particles;
    }
    
    // 填充圆形区域（用于陨石坑）
    function fillCircleArea(cx, cy, r, spacing, color) {
      const particles = [];
      const steps = Math.ceil(r * 2 / spacing);
      
      for (let i = -steps; i <= steps; i++) {
        for (let j = -steps; j <= steps; j++) {
          const px = cx + i * spacing;
          const py = cy + j * spacing;
          const dist = Math.hypot(px - cx, py - cy);
          
          if (dist > r) continue;
          
          const offsetX = (Math.random() - 0.5) * spacing * 0.5;
          const offsetY = (Math.random() - 0.5) * spacing * 0.5;
          const size = spacing * 0.3 + Math.random() * spacing * 0.15;
          
          particles.push(new Particle(px + offsetX, py + offsetY, size, color, { floatRange: 0.3 }));
        }
      }
      return particles;
    }
    
    function initParticles() {
      particles = [];
      const r = radius;
      const bodySpacing = 5; // 粒子间距，越小越密
      
      // 陨石坑定义 - 上下翻转后的位置
      const craters = [
        { cx: centerX - 0.3 * r, cy: centerY + 0.25 * r, r: 0.08 * r },  // 左下
        { cx: centerX + 0.35 * r, cy: centerY + 0.15 * r, r: 0.06 * r },  // 右下
        { cx: centerX + 0.1 * r, cy: centerY - 0.1 * r, r: 0.04 * r },    // 中上
      ];
      
      // 1. 天体主体 - 密集填充
      particles.push(...fillCircle(centerX, centerY, r * 0.96, bodySpacing, craters));
      
      // 2. 陨石坑 - 白色粒子
      for (const crater of craters) {
        particles.push(...fillCircleArea(crater.cx, crater.cy, crater.r * 0.9, bodySpacing * 0.8, colors.crater));
      }
      
      // 3. 流星拖尾 - 右下方向，用粒子排列成粗线条
      const trailBaseAngle = -Math.PI * 0.25; // 右下45度
      const trailStartX = centerX + Math.cos(0.4) * r * 0.9;
      const trailStartY = centerY + Math.sin(0.4) * r * 0.9;
      
      // 3条主要拖尾线条
      const trailAngles = [-0.35, -0.25, -0.15];
      for (const angleOffset of trailAngles) {
        const angle = trailBaseAngle + angleOffset;
        const length = r * (1.0 + Math.abs(angleOffset) * 2);
        const lineSpacing = 5;
        
        for (let d = 0; d < length; d += lineSpacing) {
          const px = trailStartX + Math.cos(angle) * d;
          const py = trailStartY + Math.sin(angle) * d;
          const size = (3 - d / length * 2) + Math.random() * 0.5;
          
          // 每条线周围加点随机粒子增加宽度
          for (let k = 0; k < 2; k++) {
            const ox = (Math.random() - 0.5) * 6;
            const oy = (Math.random() - 0.5) * 6;
            const s = size * (0.5 + Math.random() * 0.5);
            particles.push(new Particle(px + ox, py + oy, s, colors.trail, { floatRange: 0.8 }));
          }
        }
      }
      
      // 拖尾周围散落粒子
      for (let i = 0; i < 40; i++) {
        const angle = trailBaseAngle + (Math.random() - 0.5) * 0.8;
        const dist = r * (0.5 + Math.random() * 1.2);
        const px = centerX + Math.cos(angle) * dist;
        const py = centerY + Math.sin(angle) * dist;
        const size = 1 + Math.random() * 2.5;
        particles.push(new Particle(px, py, size, colors.trail, { floatRange: 1.2 }));
      }
    }
    
    function animate(time) {
      ctx.clearRect(0, 0, width, height);
      
      for (const p of particles) {
        p.update(time);
        p.draw();
      }
      
      animationId = requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    
    canvas.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    
    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      mouse.active = true;
    });
    
    canvas.addEventListener('touchend', () => {
      mouse.active = false;
    });
    
    resize();
    animate(0);
  </script>
</body>
</html>
