<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid 粒子动效预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .title {
      position: relative;
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }
    
    .title h1 {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      color: #e0d4ff;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    
    .title h1 span {
      color: #b3a2f2;
    }
    
    .title p {
      font-size: clamp(16px, 2.5vw, 24px);
      color: rgba(200, 190, 255, 0.6);
      font-style: italic;
      margin-bottom: 8px;
    }
    
    .title .subtitle-en {
      font-size: clamp(12px, 1.5vw, 16px);
      color: rgba(200, 190, 255, 0.4);
      letter-spacing: 0.05em;
    }
    
    .info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 190, 255, 0.4);
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="particleCanvas"></canvas>
    <div class="title">
      <h1>知识的<span>小行星</span></h1>
      <p>知识的沉淀与共鸣</p>
      <div class="subtitle-en">Deposits and resonance of knowledge</div>
    </div>
  </div>
  <div class="info">鼠标移动有交互效果 | 刷新页面重新生成</div>

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height, centerX, centerY;
    let particles = [];
    let mouse = { x: 0, y: 0, active: false };
    let animationId;
    
    // 粒子配置
    const config = {
      asteroidRadius: 0.12,  // 球体占屏幕比例
      constellationPoints: 20,
      trailParticles: 35,
      connectionDistance: 100,
      colors: {
        asteroid: 'rgba(20, 15, 35, 0.9)',
        asteroidBorder: 'rgba(179, 162, 242, 0.4)',
        constellation: 'rgba(200, 190, 255, 0.7)',
        trail: 'rgba(179, 162, 242, 0.5)',
        connection: 'rgba(179, 162, 242, 0.15)',
        glow: 'rgba(147, 130, 220, 0.3)',
      }
    };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
      initParticles();
    }
    
    class Particle {
      constructor(type) {
        this.type = type;
        this.init();
      }
      
      init() {
        const asteroidRadius = Math.min(width, height) * config.asteroidRadius;
        
        if (this.type === 'asteroid') {
          this.x = centerX;
          this.y = centerY;
          this.size = asteroidRadius;
          this.color = config.colors.asteroid;
          this.vx = 0;
          this.vy = 0;
        } else if (this.type === 'constellation') {
          const angle = Math.random() * Math.PI * 2;
          const radius = asteroidRadius * (0.7 + Math.random() * 0.6);
          this.x = centerX + Math.cos(angle) * radius;
          this.y = centerY + Math.sin(angle) * radius;
          this.originX = this.x;
          this.originY = this.y;
          this.size = 1 + Math.random() * 2;
          this.color = config.colors.constellation;
          this.vx = 0;
          this.vy = 0;
          this.speed = 0.001 + Math.random() * 0.002;
          this.floatOffset = Math.random() * Math.PI * 2;
        } else if (this.type === 'trail') {
          const angle = Math.random() * Math.PI * 2;
          const orbitRadius = asteroidRadius * (1.1 + Math.random() * 1.8);
          this.x = centerX + Math.cos(angle) * orbitRadius;
          this.y = centerY + Math.sin(angle) * orbitRadius;
          this.size = 0.8 + Math.random() * 1.5;
          this.color = config.colors.trail;
          this.opacity = 0.3 + Math.random() * 0.5;
          this.angle = angle;
          this.orbitRadius = orbitRadius;
          this.speed = 0.003 + Math.random() * 0.008;
          this.trail = [];
          for (let i = 0; i < 6; i++) {
            this.trail.push({ x: this.x, y: this.y });
          }
        }
      }
      
      update(time) {
        if (this.type === 'asteroid') {
          // 球体微微呼吸
          this.size = Math.min(width, height) * config.asteroidRadius + Math.sin(time * 0.001) * 3;
          return;
        }
        
        if (this.type === 'constellation') {
          // 星座点轻微浮动
          this.x = this.originX + Math.sin(time * this.speed + this.floatOffset) * 4;
          this.y = this.originY + Math.cos(time * this.speed + this.floatOffset) * 4;
        }
        
        if (this.type === 'trail') {
          // 尾迹粒子沿轨道运动
          this.angle += this.speed;
          const targetX = centerX + Math.cos(this.angle) * this.orbitRadius;
          const targetY = centerY + Math.sin(this.angle) * this.orbitRadius;
          
          // 更新尾迹
          this.trail.unshift({ x: this.x, y: this.y });
          if (this.trail.length > 6) this.trail.pop();
          
          // 平滑移动
          this.x += (targetX - this.x) * 0.08;
          this.y += (targetY - this.y) * 0.08;
        }
        
        // 鼠标排斥效果
        if (mouse.active) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 120;
          
          if (dist < maxDist && dist > 0) {
            const force = (1 - dist / maxDist) * 30;
            this.x += (dx / dist) * force;
            this.y += (dy / dist) * force;
          }
        }
      }
      
      draw() {
        if (this.type === 'asteroid') {
          // 绘制球体
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
          
          // 球体边框
          ctx.strokeStyle = config.colors.asteroidBorder;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          
          // 球体内部几何线条
          this.drawAsteroidLines();
          return;
        }
        
        if (this.type === 'trail' && this.trail.length > 1) {
          // 绘制尾迹线
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for (let i = 1; i < this.trail.length; i++) {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          ctx.strokeStyle = `rgba(179, 162, 242, ${this.opacity * 0.3})`;
          ctx.lineWidth = this.size * 0.6;
          ctx.lineCap = 'round';
          ctx.stroke();
        }
        
        // 绘制粒子点
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // 发光效果
        if (this.size > 1.5) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
          const gradient = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size * 2.5
          );
          gradient.addColorStop(0, this.color.replace(/[\d.]+\)$/, '0.2)'));
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }
      
      drawAsteroidLines() {
        const numLines = 15;
        const radius = this.size;
        
        ctx.strokeStyle = 'rgba(200, 190, 255, 0.15)';
        ctx.lineWidth = 0.8;
        
        for (let i = 0; i < numLines; i++) {
          const angle1 = (Math.PI * 2 * i) / numLines + Math.random() * 0.3;
          const angle2 = angle1 + (Math.PI * 2 / numLines) * (0.3 + Math.random() * 0.5);
          
          const x1 = this.x + Math.cos(angle1) * radius * (0.3 + Math.random() * 0.7);
          const y1 = this.y + Math.sin(angle1) * radius * (0.3 + Math.random() * 0.7);
          const x2 = this.x + Math.cos(angle2) * radius * (0.3 + Math.random() * 0.7);
          const y2 = this.y + Math.sin(angle2) * radius * (0.3 + Math.random() * 0.7);
          
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      }
    }
    
    function initParticles() {
      particles = [];
      
      // 添加球体
      particles.push(new Particle('asteroid'));
      
      // 添加星座点
      for (let i = 0; i < config.constellationPoints; i++) {
        particles.push(new Particle('constellation'));
      }
      
      // 添加尾迹粒子
      for (let i = 0; i < config.trailParticles; i++) {
        particles.push(new Particle('trail'));
      }
    }
    
    function drawConnections() {
      const constellationParticles = particles.filter(p => p.type === 'constellation');
      
      for (let i = 0; i < constellationParticles.length; i++) {
        for (let j = i + 1; j < constellationParticles.length; j++) {
          const p1 = constellationParticles[i];
          const p2 = constellationParticles[j];
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < config.connectionDistance) {
            const opacity = (1 - dist / config.connectionDistance) * 0.35;
            ctx.strokeStyle = `rgba(200, 190, 255, ${opacity})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        }
      }
    }
    
    function animate(time) {
      ctx.clearRect(0, 0, width, height);
      
      // 更新和绘制粒子
      particles.forEach(p => {
        p.update(time);
        p.draw();
      });
      
      // 绘制连线
      drawConnections();
      
      animationId = requestAnimationFrame(animate);
    }
    
    // 事件监听
    window.addEventListener('resize', resize);
    
    canvas.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    
    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      mouse.active = true;
    });
    
    canvas.addEventListener('touchend', () => {
      mouse.active = false;
    });
    
    // 初始化
    resize();
    animate(0);
  </script>
</body>
</html>
