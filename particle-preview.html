<style>
  :root {
    --canvas-size: 500px;
    --bg-color: #0a0a0a;
    --primary-color: #ffffff;
    --secondary-color: #888888;
    --accent-color: #00ff88;
    --tail-color: #00aaff;
  }

  #particle-container {
    width: 100%;
    height: 100vh;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  #particle-canvas {
    width: var(--canvas-size);
    height: var(--canvas-size);
  }

  .controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
  }

  .control-btn {
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.1);
    color: var(--primary-color);
    border: 1px solid var(--secondary-color);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
  }

  .control-btn:hover {
    background: var(--accent-color);
    color: var(--bg-color);
    border-color: var(--accent-color);
  }

  .control-btn.active {
    background: var(--accent-color);
    color: var(--bg-color);
    border-color: var(--accent-color);
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 12px;
    border-radius: 6px;
  }

  .slider-container label {
    color: var(--primary-color);
    font-size: 12px;
    white-space: nowrap;
  }

  .slider-container input[type="range"] {
    width: 80px;
    accent-color: var(--accent-color);
  }
</style>

<div id="particle-container">
  <canvas id="particle-canvas"></canvas>
  <div class="controls">
    <button class="control-btn active" id="btn-reset">重置动画</button>
    <button class="control-btn" id="btn-pause">暂停</button>
    <div class="slider-container">
      <label>粒子密度</label>
      <input type="range" id="density-slider" min="50" max="300" step="10" value="150">
    </div>
    <div class="slider-container">
      <label>速度</label>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    const container = document.getElementById('particle-container');
    const btnReset = document.getElementById('btn-reset');
    const btnPause = document.getElementById('btn-pause');
    const densitySlider = document.getElementById('density-slider');
    const speedSlider = document.getElementById('speed-slider');
    
    let width, height;
    let centerX, centerY;
    let radius;
    
    let asteroidParticles = [];
    let tailLines = [];
    let streamingParticles = [];
    
    let animationId = null;
    let isPaused = false;
    let time = 0;
    let particleDensity = 150;
    let speedMultiplier = 1;
    
    function resize() {
      const size = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--canvas-size'));
      canvas.width = size * window.devicePixelRatio;
      canvas.height = size * window.devicePixelRatio;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      
      width = canvas.width;
      height = canvas.height;
      centerX = width / 2;
      centerY = height / 2;
      radius = width * 0.35;
    }
    
    function initAsteroidParticles() {
      asteroidParticles = [];
      
      const count = particleDensity;
      const asteroidRadius = radius;
      
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * asteroidRadius;
        
        const x = centerX + Math.cos(theta) * r;
        const y = centerY + Math.sin(theta) * r;
        
        const size = Math.random() * 2 + 1;
        const opacity = Math.random() * 0.5 + 0.5;
        const speed = Math.random() * 0.02 + 0.01;
        const angle = Math.random() * Math.PI * 2;
        
        asteroidParticles.push({
          x, y,
          baseX: x,
          baseY: y,
          size,
          opacity,
          speed,
          angle,
          oscillation: Math.random() * 0.5 + 0.5
        });
      }
    }
    
    function initTailLines() {
      tailLines = [];
      
      const tailLength = 50;
      const tailWidth = 8;
      const angle = Math.PI / 4;
      
      const startX = centerX - Math.cos(angle) * (radius + 30);
      const startY = centerY + Math.sin(angle) * (radius + 30);
      
      for (let i = 0; i < tailLength; i++) {
        const t = i / tailLength;
        const lineAngle = angle + (Math.random() - 0.5) * 0.3;
        const lineLength = Math.random() * 15 + 10;
        const offsetX = (Math.random() - 0.5) * tailWidth * (1 - t);
        const offsetY = (Math.random() - 0.5) * tailWidth * (1 - t);
        
        const lineStartX = startX - Math.cos(lineAngle) * i * 3 + offsetX;
        const lineStartY = startY + Math.sin(lineAngle) * i * 3 + offsetY;
        
        const lineEndX = lineStartX - Math.cos(lineAngle) * lineLength;
        const lineEndY = lineStartY + Math.sin(lineAngle) * lineLength;
        
        tailLines.push({
          x1: lineStartX,
          y1: lineStartY,
          x2: lineEndX,
          y2: lineEndY,
          baseX1: lineStartX,
          baseY1: lineStartY,
          baseX2: lineEndX,
          baseY2: lineEndY,
          opacity: (1 - t) * 0.8,
          width: Math.max(1, (1 - t) * 2),
          delay: t * 2
        });
      }
    }
    
    function initStreamingParticles() {
      streamingParticles = [];
      
      const count = particleDensity / 2;
      const tailAngle = Math.PI / 4;
      const startX = centerX - Math.cos(tailAngle) * (radius + 30);
      const startY = centerY + Math.sin(tailAngle) * (radius + 30);
      
      for (let i = 0; i < count; i++) {
        const offset = Math.random() * 150;
        const spread = (Math.random() - 0.5) * 20;
        
        streamingParticles.push({
          baseX: startX - Math.cos(tailAngle) * offset + Math.sin(tailAngle) * spread,
          baseY: startY + Math.sin(tailAngle) * offset + Math.cos(tailAngle) * spread,
          size: Math.random() * 1.5 + 0.5,
          opacity: Math.random() * 0.6 + 0.2,
          speed: Math.random() * 0.03 + 0.01,
          angle: Math.random() * Math.PI * 2,
          offset: offset
        });
      }
    }
    
    function updateParticles(deltaTime) {
      const dt = deltaTime * speedMultiplier;
      time += dt;
      
      asteroidParticles.forEach(p => {
        p.x = p.baseX + Math.sin(time * p.speed * 10 + p.angle) * p.oscillation * 2;
        p.y = p.baseY + Math.cos(time * p.speed * 10 + p.angle) * p.oscillation * 2;
      });
      
      tailLines.forEach(line => {
        const delay = line.delay;
        const wave = Math.sin(time * 2 - delay * 5) * 3;
        
        line.x1 = line.baseX1 + wave;
        line.y1 = line.baseY1 + wave * 0.5;
        line.x2 = line.baseX2 + wave;
        line.y2 = line.baseY2 + wave * 0.5;
      });
      
      streamingParticles.forEach(p => {
        p.x = p.baseX + Math.sin(time * p.speed * 10 + p.angle) * 1;
        p.y = p.baseY + Math.cos(time * p.speed * 10 + p.angle) * 1;
      });
    }
    
    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 1;
      tailLines.forEach(line => {
        ctx.globalAlpha = line.opacity;
        ctx.lineWidth = line.width;
        ctx.beginPath();
        ctx.moveTo(line.x1, line.y1);
        ctx.lineTo(line.x2, line.y2);
        ctx.stroke();
      });
      
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffffff';
      asteroidParticles.forEach(p => {
        ctx.globalAlpha = p.opacity;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.fillStyle = '#88aacc';
      streamingParticles.forEach(p => {
        ctx.globalAlpha = p.opacity;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.globalAlpha = 1;
    }
    
    function animate(currentTime) {
      if (!isPaused) {
        const deltaTime = 0.016;
        updateParticles(deltaTime);
        drawParticles();
      }
      animationId = requestAnimationFrame(animate);
    }
    
    function init() {
      resize();
      initAsteroidParticles();
      initTailLines();
      initStreamingParticles();
      drawParticles();
      animationId = requestAnimationFrame(animate);
    }
    
    function reset() {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }
      time = 0;
      init();
    }
    
    btnReset.addEventListener('click', reset);
    
    btnPause.addEventListener('click', () => {
      isPaused = !isPaused;
      btnPause.textContent = isPaused ? '继续' : '暂停';
      btnPause.classList.toggle('active', isPaused);
    });
    
    densitySlider.addEventListener('input', (e) => {
      particleDensity = parseInt(e.target.value);
      reset();
    });
    
    speedSlider.addEventListener('input', (e) => {
      speedMultiplier = parseFloat(e.target.value);
    });
    
    window.addEventListener('resize', () => {
      reset();
    });
    
    init();
  })();
</script>
