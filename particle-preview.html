<style>
  #particle-container {
    width: 100%;
    height: 500px;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  #particle-canvas {
    width: 500px;
    height: 500px;
  }

  .controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
  }

  .control-btn {
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.1);
    color: #000000;
    border: 1px solid #888888;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s ease;
  }

  .control-btn:hover {
    background: #000000;
    color: #ffffff;
    border-color: #000000;
  }

  .control-btn.active {
    background: #000000;
    color: #ffffff;
    border-color: #000000;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.1);
    padding: 8px 12px;
    border-radius: 6px;
  }

  .slider-container label {
    color: #000000;
    font-size: 12px;
    white-space: nowrap;
  }

  .slider-container input[type="range"] {
    width: 80px;
    accent-color: #000000;
  }
</style>

<div id="particle-container">
  <canvas id="particle-canvas"></canvas>
  <div class="controls">
    <button class="control-btn active" id="btn-reset">重置</button>
    <button class="control-btn" id="btn-pause">暂停</button>
    <div class="slider-container">
      <label>粒子数</label>
      <input type="range" id="density-slider" min="100" max="800" step="50" value="300">
    </div>
    <div class="slider-container">
      <label>转速</label>
      <input type="range" id="speed-slider" min="0.2" max="2" step="0.1" value="0.8">
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    const btnReset = document.getElementById('btn-reset');
    const btnPause = document.getElementById('btn-pause');
    const densitySlider = document.getElementById('density-slider');
    const speedSlider = document.getElementById('speed-slider');
    
    let width, height, centerX, centerY, sphereRadius;
    let particles = [];
    let tailLines = [];
    let animationId = null;
    let isPaused = false;
    let time = 0;
    let particleCount = 300;
    let rotationSpeed = 0.8;
    let rotX = 0, rotY = 0, rotZ = 0;
    
    const tailAngle = Math.PI * 1.25;
    
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = 500 * dpr;
      canvas.height = 500 * dpr;
      canvas.style.width = '500px';
      canvas.style.height = '500px';
      
      width = canvas.width;
      height = canvas.height;
      centerX = width / 2;
      centerY = height / 2;
      sphereRadius = width * 0.32;
    }
    
    function fibonacciSphere(samples) {
      const points = [];
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      
      for (let i = 0; i < samples; i++) {
        const y = 1 - (i / (samples - 1)) * 2;
        const radiusAtY = Math.sqrt(1 - y * y);
        const theta = goldenAngle * i;
        
        points.push({
          x: Math.cos(theta) * radiusAtY,
          y: y,
          z: Math.sin(theta) * radiusAtY
        });
      }
      
      return points;
    }
    
    function initParticles() {
      particles = [];
      const spherePoints = fibonacciSphere(particleCount);
      
      spherePoints.forEach((point) => {
        particles.push({
          x: point.x * sphereRadius,
          y: point.y * sphereRadius,
          z: point.z * sphereRadius,
          size: Math.random() * 1.2 + 0.8,
          brightness: Math.random() * 0.3 + 0.7,
          projX: 0,
          projY: 0,
          projZ: 0
        });
      });
    }
    
    function rotateX(p, angle) {
      const c = Math.cos(angle), s = Math.sin(angle);
      return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
    }
    
    function rotateY(p, angle) {
      const c = Math.cos(angle), s = Math.sin(angle);
      return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
    }
    
    function rotateZ(p, angle) {
      const c = Math.cos(angle), s = Math.sin(angle);
      return { x: p.x * c - p.y * s, y: p.x * s + p.y * c, z: p.z };
    }
    
    function project(p) {
      const fov = 500;
      const distance = fov + p.z;
      const scale = fov / distance;
      
      return {
        x: centerX + p.x * scale,
        y: centerY + p.y * scale,
        z: p.z,
        scale
      };
    }
    
    function initTailLines() {
      tailLines = [];
      
      const offsetX = 30;
      const offsetY = 30;
      const startX = centerX - Math.cos(tailAngle) * (sphereRadius + 15) - offsetX;
      const startY = centerY + Math.sin(tailAngle) * (sphereRadius + 15) + offsetY;
      
      const lineCount = 8;
      
      for (let i = 0; i < lineCount; i++) {
        const t = i / (lineCount - 1);
        const length = (1 - t) * 100 + 40;
        const spread = (Math.random() - 0.5) * 6;
        const angleVar = (Math.random() - 0.5) * 0.2;
        
        const lineAngle = tailAngle + angleVar;
        const lineStartX = startX - Math.cos(tailAngle) * t * 120 + Math.sin(tailAngle) * spread;
        const lineStartY = startY + Math.sin(tailAngle) * t * 120 + Math.cos(tailAngle) * spread;
        
        tailLines.push({
          x1: lineStartX,
          y1: lineStartY,
          x2: lineStartX - Math.cos(lineAngle) * length,
          y2: lineStartY + Math.sin(lineAngle) * length,
          baseX1: lineStartX,
          baseY1: lineStartY,
          baseX2: lineStartX - Math.cos(lineAngle) * length,
          baseY2: lineStartY + Math.sin(lineAngle) * length,
          opacity: (1 - t) * 0.6,
          width: Math.max(0.5, (1 - t * 0.7) * 1.2),
          delay: t * 2,
          speed: 0.6 + Math.random() * 0.5
        });
      }
    }
    
    function update(dt) {
      time += dt;
      
      rotX += dt * 0.25 * rotationSpeed;
      rotY += dt * 0.4 * rotationSpeed;
      rotZ += dt * 0.1 * rotationSpeed;
      
      particles.forEach(p => {
        let rotated = { x: p.x, y: p.y, z: p.z };
        rotated = rotateX(rotated, rotX);
        rotated = rotateY(rotated, rotY);
        rotated = rotateZ(rotated, rotZ);
        
        const projected = project(rotated);
        p.projX = projected.x;
        p.projY = projected.y;
        p.projZ = projected.z;
        p.scale = projected.scale;
      });
      
      tailLines.forEach(line => {
        const wave = Math.sin(time * line.speed - line.delay * 2) * 3;
        const wave2 = Math.cos(time * line.speed * 0.8 - line.delay * 1.5) * 2;
        
        line.x1 = line.baseX1 + wave;
        line.y1 = line.baseY1 + wave2;
        line.x2 = line.baseX2 + wave * 1.3;
        line.y2 = line.baseY2 + wave2 * 1.3;
      });
    }
    
    function draw() {
      ctx.clearRect(0, 0, width, height);
      
      ctx.strokeStyle = '#4488cc';
      tailLines.forEach(line => {
        ctx.globalAlpha = line.opacity;
        ctx.lineWidth = line.width;
        ctx.beginPath();
        ctx.moveTo(line.x1, line.y1);
        ctx.lineTo(line.x2, line.y2);
        ctx.stroke();
      });
      
      ctx.globalAlpha = 1;
      particles.sort((a, b) => b.projZ - a.projZ);
      
      particles.forEach(p => {
        const depthNorm = (p.projZ + sphereRadius) / (2 * sphereRadius);
        const opacity = p.brightness * (0.25 + depthNorm * 0.75);
        const size = p.size * (0.5 + depthNorm * 0.5) * p.scale;
        
        const val = Math.floor(180 + depthNorm * 75);
        ctx.fillStyle = `rgba(${val}, ${val}, ${Math.floor(val + 20)}, ${opacity})`;
        ctx.beginPath();
        ctx.arc(p.projX, p.projY, size, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    let lastTime = 0;
    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;
      
      if (!isPaused) {
        update(dt);
        draw();
      }
      animationId = requestAnimationFrame(animate);
    }
    
    function init() {
      resize();
      initParticles();
      initTailLines();
      rotX = 0; rotY = 0; rotZ = 0;
      draw();
      lastTime = 0;
      animationId = requestAnimationFrame(animate);
    }
    
    btnReset.addEventListener('click', init);
    
    btnPause.addEventListener('click', () => {
      isPaused = !isPaused;
      btnPause.textContent = isPaused ? '继续' : '暂停';
      btnPause.classList.toggle('active', isPaused);
    });
    
    densitySlider.addEventListener('input', (e) => {
      particleCount = parseInt(e.target.value);
      init();
    });
    
    speedSlider.addEventListener('input', (e) => {
      rotationSpeed = parseFloat(e.target.value);
    });
    
    window.addEventListener('resize', init);
    
    init();
  })();
</script>
